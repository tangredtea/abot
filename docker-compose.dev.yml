version: '3.8'

services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: abot
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Development mode - mount source code with hot reload
  abot-dev:
    image: golang:1.21
    working_dir: /app
    volumes:
      - .:/app
      - go-cache:/go/pkg/mod
    environment:
      - MYSQL_DSN=root:rootpass@tcp(mysql:3306)/abot
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-default-secret-change-me}
    ports:
      - "8080:8080"
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "
        go mod download &&
        go install github.com/cosmtrek/air@latest &&
        air -c .air.toml
      "

  # Optional: Qdrant vector database
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  mysql-data:
  go-cache:
  qdrant-data:

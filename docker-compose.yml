version: '3.8'

services:
  # MySQL database
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: abot
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  # abot-agent (CLI mode)
  abot-agent:
    build:
      context: .
      dockerfile: cmd/abot-agent/Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./config.agent.example.yaml:/app/config.yaml
      - agent-sessions:/root/.abot/sessions
    stdin_open: true
    tty: true
    command: ["-config", "/app/config.yaml"]

  # abot-server (API mode)
  abot-server:
    build:
      context: .
      dockerfile: cmd/abot-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - MYSQL_DSN=root:rootpass@tcp(mysql:3306)/abot
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-default-secret-change-me}
    volumes:
      - ./config.server.example.yaml:/app/config.yaml
      - ${ABOT_WORKSPACE_DIR:-./data/workspace}:/app/workspace       # host bind-mount for workspace
      - /var/run/docker.sock:/var/run/docker.sock                     # DooD: spawn sandbox containers via host Docker
    depends_on:
      mysql:
        condition: service_healthy
    command: ["-config", "/app/config.yaml"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # abot-web (Web Console mode)
  abot-web:
    build:
      context: .
      dockerfile: cmd/abot-web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - MYSQL_DSN=root:rootpass@tcp(mysql:3306)/abot
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-default-secret-change-me}
    volumes:
      - ./config.web.example.yaml:/app/config.yaml
      - ${ABOT_WORKSPACE_DIR:-./data/workspace}:/app/workspace       # host bind-mount for workspace
      - /var/run/docker.sock:/var/run/docker.sock                     # DooD: spawn sandbox containers via host Docker
    depends_on:
      mysql:
        condition: service_healthy
    command: ["-config", "/app/config.yaml"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Sandbox image (build once: docker compose build sandbox)
  sandbox:
    build:
      context: .
      dockerfile: sandbox.Dockerfile
    image: abot/sandbox:latest
    profiles: ["build"]  # only build, don't start

  # Optional: Qdrant vector database
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  mysql-data:
  agent-sessions:
  qdrant-data:

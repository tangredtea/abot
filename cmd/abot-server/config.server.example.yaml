# ABot Server Configuration Example
# This is the configuration for abot-server (API-only mode, no Web UI)
# Copy to config.yaml and customize for your deployment

app_name: abot

# MySQL database (required for server mode)
mysql_dsn: "user:password@tcp(localhost:3306)/abot?charset=utf8mb4&parseTime=True&loc=Local"

# LLM Provider configuration
providers:
  - name: primary
    api_base: "https://api.openai.com/v1"
    api_key: "sk-YOUR-KEY-HERE"
    model: "gpt-4o-mini"

# Agent definitions
agents:
  - id: default-bot
    name: assistant
    description: "A helpful assistant"

context_window: 128000
bus_buffer_size: 100

# Console API configuration
console:
  addr: ":3000"
  jwt_secret: "change-me-to-a-random-secret-at-least-32-chars"
  encryption_secret: "change-me-to-a-different-secret-at-least-32-chars"
  allowed_origins:
    - "http://localhost:3001"  # Your frontend app
    - "https://yourdomain.com"
    # - "*"  # Allow all origins (not recommended for production)

# Optional: Sandbox configuration
# sandbox:
#   # Landlock (application-layer, Linux only):
#   # level: "standard"           # none / standard / strict
#   # sandbox_binary: ""          # path to abot-sandbox (auto-detected if empty)
#   #
#   # Container (Docker/gVisor, recommended for multi-tenant):
#   level: "container"
#   container_runtime: "runsc"        # gVisor syscall-level isolation
#   container_image: "abot/sandbox:latest"
#   container_mem_mb: 512
#   container_cpus: "0.5"
#   container_pids: 256
#   container_network: "none"         # "none" / Docker network name
#   container_tmp_mb: 100
#   container_workspace_root: ""     # DooD mode: host-side workspace path
#   restrict_to_workspace: true

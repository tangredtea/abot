# ABot minimal configuration example.
# Copy to config.yaml and fill in your API key to run interactively:
#   go run ./cmd/abot/ -config config.yaml

app_name: abot

providers:
  - name: primary
    api_base: "https://api.openai.com/v1"
    api_key: "sk-YOUR-KEY-HERE"
    model: "gpt-4o-mini"

agents:
  - id: default-bot
    name: assistant
    description: "A helpful assistant"

context_window: 128000
bus_buffer_size: 100

# Web console mode: go run ./cmd/abot/ console -config config.yaml
console:
  addr: ":3000"
  jwt_secret: "change-me-to-a-random-secret"
  encryption_secret: "change-me-to-a-different-random-secret-at-least-32-chars"
  static_dir: "web/out"
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
    # - "*"  # Allow all origins (not recommended for production)

# sandbox:
#   # --- Landlock (application-layer, Linux only) ---
#   # level: "standard"           # none / standard / strict
#   # sandbox_binary: ""          # path to abot-sandbox (auto-detected if empty)
#
#   # --- gVisor standalone (lightweight, no Docker, recommended) ---
#   level: "gvisor"               # uses "runsc do" directly
#   # gvisor_binary: ""           # path to runsc (auto-detected if empty)
#   # gvisor_network: false       # true = allow host network (for npm install)
#
#   # --- Docker + gVisor (full container isolation, heaviest) ---
#   # level: "container"
#   # container_runtime: "runsc"    # gVisor runtime (empty = Docker default runc)
#   # container_image: "abot/sandbox:latest"
#   # container_mem_mb: 512
#   # container_cpus: "0.5"
#   # container_network: "none"
#   # container_workspace_root: ""  # DooD mode: host-side workspace path

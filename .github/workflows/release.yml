name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Build all binaries
        run: make all
      - name: Create release archives
        run: |
          mkdir -p dist
          tar -czf dist/abot-agent-linux-amd64.tar.gz -C bin abot-agent
          tar -czf dist/abot-server-linux-amd64.tar.gz -C bin abot-server
          tar -czf dist/abot-web-linux-amd64.tar.gz -C bin abot-web
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/abot-agent-linux-amd64.tar.gz
            dist/abot-server-linux-amd64.tar.gz
            dist/abot-web-linux-amd64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-release:
    name: Release Docker Images
    runs-on: ubuntu-latest
    needs: release
    strategy:
      matrix:
        target: [agent, server, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/abot-${{ matrix.target }}/Dockerfile
          push: true
          tags: |
            abot/${{ matrix.target }}:latest
            abot/${{ matrix.target }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

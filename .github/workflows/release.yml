name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build all binaries
        run: make all

      - name: Create release archives
        run: |
          mkdir -p dist
          tar -czf dist/abot-agent-linux-amd64.tar.gz -C bin abot-agent
          tar -czf dist/abot-server-linux-amd64.tar.gz -C bin abot-server
          tar -czf dist/abot-web-linux-amd64.tar.gz -C bin abot-web

      - name: Generate changelog
        id: changelog
        uses: metcalfc/changelog-generator@v4.0.1
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            dist/abot-agent-linux-amd64.tar.gz
            dist/abot-server-linux-amd64.tar.gz
            dist/abot-web-linux-amd64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-release:
    name: Release Docker Images
    runs-on: ubuntu-latest
    needs: release

    strategy:
      matrix:
        target: [agent, server, web]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v4
        with:
          context: .
          file: cmd/abot-${{ matrix.target }}/Dockerfile
          push: true
          tags: |
            abot/${{ matrix.target }}:latest
            abot/${{ matrix.target }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
